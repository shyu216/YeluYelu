name: Auto Merge PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List changed files
        id: files
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            > files.json
          
          echo "Changed files:"
          cat files.json | jq -r '.[].filename'

      - name: Validate PR
        id: validate
        run: |
          files=$(cat files.json)
          
          has_invalid=false
          
          for file in $(echo "$files" | jq -r '.[].filename'); do
            if [[ "$file" == *.json ]]; then
              echo "VALIDATE_PASS=false" >> $GITHUB_OUTPUT
              echo "REJECT_REASON=JSON files are not allowed" >> $GITHUB_OUTPUT
              has_invalid=true
              break
            fi
            
            if [[ "$file" =~ \.(js|ts|py|java|cpp|c|go|rs|php|rb|swift|kt|html|css|vue)$ ]]; then
              echo "VALIDATE_PASS=false" >> $GITHUB_OUTPUT
              echo "REJECT_REASON=Code files are not allowed" >> $GITHUB_OUTPUT
              has_invalid=true
              break
            fi
            
            if [[ "$file" == public/images/* ]] || [[ "$file" == uploads/* ]]; then
              continue
            else
              echo "VALIDATE_PASS=false" >> $GITHUB_OUTPUT
              echo "REJECT_REASON=Files must be in public/images/ or uploads/ directory" >> $GITHUB_OUTPUT
              has_invalid=true
              break
            fi
          done
          
          if [ "$has_invalid" = "false" ]; then
            echo "VALIDATE_PASS=true" >> $GITHUB_OUTPUT
          fi

      - name: Comment rejection
        if: steps.validate.outputs.VALIDATE_PASS == 'false'
        run: |
          BODY="⚠️ 自动合并被拒绝

原因: ${{ steps.validate.outputs.REJECT_REASON }}

请确保您的 PR 只包含图片文件，并且路径在 \`public/images/\` 或 \`uploads/\` 目录下。"
          
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d "{\"body\":\"$BODY\"}"

      - name: Approve PR
        if: steps.validate.outputs.VALIDATE_PASS == 'true'
        run: |
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            -d '{"event":"APPROVE"}'

      - name: Enable auto-merge
        if: steps.validate.outputs.VALIDATE_PASS == 'true'
        run: |
          sleep 3
          curl -X PUT -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/merge" \
            -d '{"merge_method":"squash"}'

      - name: Comment success
        if: steps.validate.outputs.VALIDATE_PASS == 'true'
        run: |
          BODY="✅ 自动合并成功！感谢您的贡献！"
          
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d "{\"body\":\"$BODY\"}"
